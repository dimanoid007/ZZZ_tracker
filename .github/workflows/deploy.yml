name: Sync and deploy
on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Update achievements
        run: npm run sync
      - name: Commit updated catalog
        run: |
          git config user.name "zzz-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/achievements-ru.json
          git diff --cached --quiet || git commit -m "chore: update ZZZ achievements"
          git push
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
